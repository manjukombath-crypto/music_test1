<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ol>
        <li>red</li>
        <li>green</li> 
        <li>blue</li>
    </ol>
    <ol type="A">
        <li>red</li>
        <li>green</li> 
        <li>blue</li>
    </ol>
    <ol type="I">
        <li>red</li>
        <li>green</li> 
        <li>blue</li>
    </ol>

    <ul type=>
        <li>red</li>
        <li>green</li> 
        <li>blue</li>
    </ul>
    <ul type="circle">
        <li>red</li>
        <li>green</li> 
        <li>blue</li>
    </ul>
    <ul type="square">
        <li>red</li>
        <li>green</li> 
        <li>blue</li>
    </ul>

    <dl>
        <dt><b>red</b></dt>
        <dd>the colour of fire and blood</dd>
        <dt><i>green</i></dt>
        <dd>the colour of grass and leaves</dd>
        <dt><u>blue</u></dt>
        <dd>the colour of sky and ocean</dd>
    </dl>

    
</body>
</html>
